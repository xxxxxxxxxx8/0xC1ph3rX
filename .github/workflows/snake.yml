name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: 0xC1ph3rX
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: snake.svg?color_snake=#00FF41&color_dots=#0a0a0a,#001a00,#003300,#006600,#00FF41
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update snake.svg"
          branch: main
